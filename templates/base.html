{% load static %}

<!DOCTYPE html>
<head>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
    <title>bernardao</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="sidebar">
        <img src="{% static 'imgs/BussCall.jpg' %}" alt="Logo" class="sidebarlogo">

        <div class="sidebarblock">
            <a href="/home" class="sidebarblocklink">
                <span class="material-symbols-outlined sidebarblockicon">home</span>
                <h1>Home</h1>
            </a>
        </div>

        <div class="sidebarblock">
            <a href="/onibus" class="sidebarblocklink">
                <span class="material-symbols-outlined sidebarblockicon">directions_bus</span>
                <h1>Frota</h1>
            </a>
        </div>

        <div class="sidebarblock">
            <a href="/clientes" class="sidebarblocklink">
                <span class="material-symbols-outlined sidebarblockicon">boy</span>
                <h1>Clientes</h1>
            </a>
        </div>

        <div class="sidebarblock">
            <a href="/viagem" class="sidebarblocklink">
                <span class="material-symbols-outlined sidebarblockicon">travel</span>
                <h1>Viagem</h1>
            </a>
        </div>

        

        <div class="profile">

            <div class="sidebarblock">
                <a href="" class="sidebarblocklink">
                    <span class="material-symbols-outlined sidebarblockicon">account_circle</span>
                    <h1>Perfil</h1>
                </a>
            </div>

            <a href="/logout" class="sidebarblocklink"><h1>Sair</h1></a>
        </div>

    </div>
    <div class="conteudo">
    {% block content%}
    {% endblock content%}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    {% block scripts %}
    {% endblock scripts %}
</body>
